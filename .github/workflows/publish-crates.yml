name: publish-crates

# Runs after cargo-dist's `release.yml` finishes successfully for a tag
# push. We chain via `workflow_run` because cargo-dist creates the GitHub
# Release using the default GITHUB_TOKEN, and events fired by GITHUB_TOKEN
# do not trigger downstream `release: published` workflows.
#
# Requires repo secret CARGO_REGISTRY_TOKEN: a crates.io API token with
# publish scope on the `onmcu` crate.

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    # For workflow_run: only run when the upstream Release workflow succeeded
    # and was triggered by a tag push (release.yml also runs on PRs). Skip
    # prerelease tags (anything with a `-` suffix, e.g. v0.1.0-rc.1) — crates.io
    # versions are append-only and only yankable, so a prerelease tag cut for
    # testing must not burn a permanent crates.io version.
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          (github.event.workflow_run.conclusion == 'success' &&
           github.event.workflow_run.event == 'push' &&
           startsWith(github.event.workflow_run.head_branch, 'v') &&
           !contains(github.event.workflow_run.head_branch, '-')) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify Cargo.toml version matches release tag
        if: github.event_name == 'workflow_run'
        env:
          TAG: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail
          CARGO_VERSION=$(cargo metadata --format-version 1 --no-deps \
            | jq -r '.packages[0].version')
          EXPECTED="${TAG#v}"
          if [ "$CARGO_VERSION" != "$EXPECTED" ]; then
            echo "::error::Cargo.toml version $CARGO_VERSION does not match release tag $TAG (expected $EXPECTED)"
            exit 1
          fi
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked
