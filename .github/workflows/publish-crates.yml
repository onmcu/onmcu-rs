name: publish-crates

# Runs after a GitHub Release is published (which `release.yml` from
# cargo-dist does for every v* tag). Publishes the `onmcu` crate to
# crates.io.
#
# Requires repo secret CARGO_REGISTRY_TOKEN: a crates.io API token with
# publish scope on the `onmcu` crate.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify Cargo.toml version matches release tag
        if: github.event_name == 'release'
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          CARGO_VERSION=$(cargo metadata --format-version 1 --no-deps \
            | jq -r '.packages[0].version')
          EXPECTED="${TAG#v}"
          if [ "$CARGO_VERSION" != "$EXPECTED" ]; then
            echo "::error::Cargo.toml version $CARGO_VERSION does not match release tag $TAG (expected $EXPECTED)"
            exit 1
          fi
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked
