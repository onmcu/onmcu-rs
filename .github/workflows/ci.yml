name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --locked -- -D warnings
      - run: cargo test --locked

  # Builds every target the release pipeline (cargo-dist) ships, natively
  # on the matching runner architecture, with the same `dist` profile, so
  # PRs catch cross-compile / LTO / strip regressions before tag time.
  # Mirrors the matrix in dist-workspace.toml.
  build-release:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-24.04,     target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }
          - { os: macos-26,         target: aarch64-apple-darwin }
          - { os: macos-26-intel,   target: x86_64-apple-darwin }
          - { os: windows-2025,     target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo build --locked --profile dist --target ${{ matrix.target }}

  # License compliance: enforce the deny.toml policy (copyleft denied, the
  # permissive set allowed). The THIRD-PARTY-LICENSES.html attribution file is
  # generated fresh at release time (see .github/build-setup.yml); here we only
  # smoke-test that it still generates, so a dependency carrying an unaccepted
  # license is caught at PR time rather than during a release.
  licenses:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses bans sources
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-about
      - name: Smoke-test third-party attribution generation
        run: cargo about generate about.hbs --output-file THIRD-PARTY-LICENSES.html
