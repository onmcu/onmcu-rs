name: dependency advisories

on:
  schedule:
    # 00:00 UTC every day
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  cargo-deny-advisories:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          # Scope to the RUSTSEC advisory database. Without a deny.toml the
          # default `check` would also run license/bans/sources and fail.
          command: check advisories
